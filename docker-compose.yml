version: "3.8"

services:

  backend:
    build: ./backend
    container_name: spring-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - h2-data:/app/data
    environment:
      - SPRING_PROFILES_ACTIVE=default
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: angular-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  h2-data: