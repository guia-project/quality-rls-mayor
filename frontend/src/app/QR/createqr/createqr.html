<h1 style="text-align: center;margin-top: 40px;margin-bottom: 80px;">Crear un Quality Rule</h1>

<div style="width: 80%; margin: 20px auto; text-align: center;">
  <select [formControl]="tipo" style="padding: 8px; font-size: 14px;">
    <option value="" disabled selected>Selecciona una opción</option>
    <option value="SHACL">SHACL</option>
    <option value="SPARQL">SparQL</option>
  </select>
</div>


<textarea
    [formControl]="message"
    placeholder="Introduce Quality Rule"
    style="width: 80%;height: 300px;font-size: 20px;padding: auto; display: block;margin:0 auto;margin-bottom: 40px;
    box-sizing: border-box;"
></textarea>


<button (click)="send()" style="display: block;margin: 0 auto;margin-bottom: 40px;">Send</button>

@if(responseData){
<div 
    [ngStyle]="{'background-color': isError ? 'red' : 'green'}"
    style="
    width: 80%;
    text-align: center;
    display: block;
    margin:0 auto;
    color: black;
    padding: 15px 20px;
    border-radius: 8px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    box-sizing: border-box;
    ">

  <h3 style="margin-top:0; text-align:center;">
    {{ isError ? 'Error' : 'Quality Rule creada' }}
  </h3>
  @if(!isError){
  <div >
    <p><strong>ID:</strong> {{ responseData.id }}</p>
    <p><strong>Tipo:</strong> {{ responseData.ruleType }}</p>
    <p><strong>Contenido:</strong></p>
    <pre style="white-space: pre-wrap; word-break: break-word; background:#f5f5f5; padding:10px; border-radius:6px; text-align: left;">
{{ responseData.content }}
    </pre>
  </div>
  }

  @if(isError){
  <div >
    <p>{{ responseData }}</p>
  </div>
  }

</div>
}
