<h1 style="text-align: center;margin-top: 40px;margin-bottom: 80px;">Buscar Knowledge Graph</h1>

<div style="width: 80%; margin: 20px auto; text-align: center;">
  <select [(ngModel)]="modo" style="padding: 8px; font-size: 14px;">
    <option value="" disabled selected>Selecciona una opción</option>
    <option value="uno">Mostrar uno</option>
    <option value="todos">Mostrar todos</option>
  </select>
</div>

@if (modo === 'uno') {
  <div style="width: 80%; margin: 20px auto; text-align: center;">
    <input [(ngModel)]="id" placeholder="Introduce el ID" style="width: 40%; padding: 8px; font-size: 14px;text-align: center;"/>
  </div>
}

@if (modo){
<div style="text-align: center;">
  <button (click)="buscar()" style="padding: 8px 16px;">Buscar</button>
</div>
}
