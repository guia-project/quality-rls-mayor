<h1 style="text-align: center;margin-top: 40px;margin-bottom: 80px;">Borrar un Knowledge Graph</h1>

<div style="width: 80%; margin: 20px auto; text-align: center;margin-bottom: 40px;">
    <input 
      type="text"
      [formControl]="kgid"
      placeholder="Introduce el ID de Knowledge Graph"
      style="width: 50%;padding: 8px; font-size: 14px; text-align: center;"
    />
</div>

<button (click)="delete()" style="display: block;margin: 0 auto;margin-bottom: 40px;">Validar</button>


@if(responseMessage){
<div 
    [ngStyle]="{'background-color': isError ? 'red' : 'green'}"
    style="
    width: 80%;
    text-align: center;
    display: block;
    margin:0 auto;
    color: black;
    padding: 15px 20px;
    border-radius: 8px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    box-sizing: border-box;
    ">
  {{ responseMessage }}
</div>
}
